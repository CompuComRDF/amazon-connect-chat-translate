<!DOCTYPE html>
<html>
<head>
  <title>Amazon Connect Chat (Amplify)</title>

  <!-- ✅ Official Streams API (must be loaded from Connect domain) -->
  <script src="https://uatrdf-genesysdr.my.connect.aws/connect/streams/amazon-connect-streams.js"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      color: #333;
    }

    #chat {
      margin-top: 20px;
      width: 420px;
      height: 500px;
      border: 1px solid #ccc;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 5px 0;
    }
  </style>
</head>

<body>

<h2>Amazon Connect Chat</h2>

<button onclick="startChat()">Start Chat</button>

<div id="status"></div>
<div id="chat"></div>

<script>

let chatSession;

async function startChat() {

  const status = document.getElementById("status");
  const chat = document.getElementById("chat");

  status.innerText = "Starting chat...";

  try {

    // 1. Call your backend (already confirmed working)
    const res = await fetch(
      "https://t0zn3gqfd9.execute-api.us-east-1.amazonaws.com/start-chat",
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          name: "Amplify User",
          attributes: {
            APPLINK: "myapp://open/support"
          }
        })
      }
    );

    const data = await res.json();

    if (!data.ContactId || !data.ParticipantToken) {
      throw new Error("Invalid backend response");
    }

    status.innerText = "Connecting to Amazon Connect...";

    // 2. Create chat session (REAL Streams API)
    chatSession = connect.ChatSession.create({
      chatDetails: {
        contactId: data.ContactId,
        participantId: data.ParticipantId,
        participantToken: data.ParticipantToken
      },
      options: {
        region: "us-east-1"
      }
    });

    // 3. Connect session
    await chatSession.connect();

    status.innerText = "Connected ✔";

    // 4. Listen for messages
    chatSession.onMessage((event) => {

      const msg = document.createElement("div");
      msg.className = "msg";

      msg.innerText =
        event.data?.Content ||
        JSON.stringify(event.data);

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    });

  } catch (err) {
    console.error(err);
    status.innerText = "Error starting chat";
    alert(err.message);
  }
}

</script>

</body>
</html>
